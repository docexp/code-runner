name: Promote to stable

# Manual promotion: fast-forwards main to the current next tip, then runs
# semantic-release in main context to publish the stable version.
#
# Why not a next → main PR?
#   GitHub PR merge strategies (squash / rebase) always rewrite commit SHAs.
#   Once SHAs diverge, every subsequent next → main PR shows false conflicts.
#   A direct SSH fast-forward via a deploy key keeps both branches on exactly
#   the same linear history with no SHA rewriting.
#
# Why deploy key and not GH_PAT?
#   The main ruleset has "Deploy keys" as the sole bypass actor.  This means
#   only an SSH push authenticated with this specific key can land commits on
#   main — including the repo admin.  The merge button in any PR is blocked
#   for all humans, even org/repo admins (GitHub Enterprise enforcement).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to promote next → main and publish stable release'
        required: true
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write   # required for npm OIDC Trusted Publishing

jobs:
  promote:
    name: Promote next → main
    # Safety gates:
    #   1. Must be dispatched from the next branch (not a feature branch or main)
    #   2. Must explicitly type YES in the confirm input
    if: github.ref_name == 'next' && github.event.inputs.confirm == 'YES'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: next

      - name: Setup SSH deploy key for main push
        # The deploy key is the sole bypass actor on the main ruleset.
        # Only this SSH push can land commits on main — the merge button
        # in any PR remains blocked for all humans including repo admins.
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROMOTE_DEPLOY_KEY }}

      - name: Fast-forward main to next
        # Switches the remote to SSH and pushes HEAD to main.
        # force=false (default) — fails if main has diverged, making any
        # history problem immediately visible.
        run: |
          git remote set-url origin git@github.com:docexp/code-runner.git
          git push origin HEAD:refs/heads/main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC Trusted Publishing support
        run: |
          NPM_DIR=$(dirname $(dirname $(which node)))/lib/node_modules/npm
          rm -rf "${NPM_DIR:?}"
          mkdir -p "$NPM_DIR"
          curl -sL https://registry.npmjs.org/npm/-/npm-11.12.1.tgz | tar xz -C "$NPM_DIR" --strip-components=1
          npm --version

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Build all packages
        run: bunx nx run-many -t build --output-style=stream

      - name: Stable release
        # Override GITHUB_REF_NAME so semantic-release sees 'main' context and
        # publishes a stable version (not a pre-release).
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REF: refs/heads/main
          GITHUB_REF_NAME: main
          NPM_CONFIG_PROVENANCE: "true"
