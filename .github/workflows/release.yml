name: Release

on:
  push:
    branches:
      - next
  # workflow_dispatch kept for manual re-runs on next (e.g. to retry a failed
  # pre-release).  Stable releases on main are handled by promote.yml.
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # push trigger checks out the branch by default — git HEAD is the
          # branch tip and GITHUB_REF_NAME is the branch name. semantic-release
          # reads GITHUB_REF_NAME to determine next vs main context.
          # fetch-depth: 0 is required to walk full tag history.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for OIDC Trusted Publishing support
        run: |
          NPM_DIR=$(dirname $(dirname $(which node)))/lib/node_modules/npm
          # Delete all npm 10 files first — partial overwrites leave stale files
          # that cause "Class extends value undefined" errors when npm 11 loads.
          rm -rf "${NPM_DIR:?}"
          mkdir -p "$NPM_DIR"
          curl -sL https://registry.npmjs.org/npm/-/npm-11.12.1.tgz | tar xz -C "$NPM_DIR" --strip-components=1
          npm --version

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Build all packages
        run: bunx nx run-many -t build --output-style=stream

      - name: Release
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          NPM_CONFIG_PROVENANCE: "true"
