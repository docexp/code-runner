name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [next, main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run when the triggering CI workflow succeeded (or when manually dispatched)
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out by branch name so semantic-release can determine whether
          # it is running on `next` (pre-release) or `main` (stable release).
          # Checking out a bare SHA leaves git in detached HEAD; semantic-release
          # then cannot resolve the branch name and defaults to `next`, so stable
          # releases on `main` never fire.
          # This is safe because @semantic-release/git has been removed — nothing
          # pushes commits back to the branch, so the branch tip is always the
          # CI-validated SHA.
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for OIDC Trusted Publishing support
        run: |
          NPM_DIR=$(dirname $(dirname $(which node)))/lib/node_modules/npm
          # Delete all npm 10 files first — partial overwrites leave stale files
          # that cause "Class extends value undefined" errors when npm 11 loads.
          rm -rf "${NPM_DIR:?}"
          mkdir -p "$NPM_DIR"
          curl -sL https://registry.npmjs.org/npm/-/npm-11.12.1.tgz | tar xz -C "$NPM_DIR" --strip-components=1
          npm --version

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Build all packages
        run: bunx nx run-many -t build --output-style=stream

      - name: Release
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          NPM_CONFIG_PROVENANCE: "true"
