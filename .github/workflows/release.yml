name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [next, main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run when the triggering CI workflow succeeded (or when manually dispatched)
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the branch tip, not the triggering SHA.
          #
          # Why head_branch instead of head_sha?
          #   semantic-release pushes a chore(release): commit back to the branch
          #   after each successful run. On the next workflow_run trigger the pinned
          #   head_sha is therefore behind origin/<branch>, and semantic-release
          #   aborts with "local branch is behind the remote". Using head_branch
          #   always checks out the current branch HEAD, which semantic-release
          #   can compare correctly. The workflow_run trigger already guarantees
          #   that CI passed before release fires, so checking out the branch tip
          #   is safe — the only commits that can be ahead of the CI-validated SHA
          #   are chore(release): [skip ci] commits from previous release runs.
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for OIDC Trusted Publishing support
        run: |
          NPM_DIR=$(dirname $(dirname $(which node)))/lib/node_modules/npm
          # Delete all npm 10 files first — partial overwrites leave stale files
          # that cause "Class extends value undefined" errors when npm 11 loads.
          rm -rf "${NPM_DIR:?}"
          mkdir -p "$NPM_DIR"
          curl -sL https://registry.npmjs.org/npm/-/npm-11.12.1.tgz | tar xz -C "$NPM_DIR" --strip-components=1
          npm --version

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Build all packages
        run: bunx nx run-many -t build --output-style=stream

      - name: Release
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          NPM_CONFIG_PROVENANCE: "true"
