name: CI

on:
  pull_request:
    branches: [next]

jobs:
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Typecheck (PR — affected only)
        if: github.event_name == 'pull_request'
        run: bunx nx affected -t typecheck --base=origin/${{ github.base_ref }} --head=HEAD --output-style=stream

      - name: Typecheck (push — all)
        if: github.event_name == 'push'
        run: bunx nx run-many -t typecheck --output-style=stream

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Test (PR — affected only)
        if: github.event_name == 'pull_request'
        run: bunx nx affected -t test --base=origin/${{ github.base_ref }} --head=HEAD --output-style=stream
        env:
          CI: true

      - name: Test (push — all)
        if: github.event_name == 'push'
        run: bunx nx run-many -t test --output-style=stream
        env:
          CI: true

  e2e:
    name: E2e tests
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2e
        run: bunx nx run react-e2e:e2e --output-style=stream
        env:
          CI: true
