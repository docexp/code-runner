<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>code-runner e2e</title>
    <style>
      body { font-family: sans-serif; padding: 1rem; background: #111; color: #eee; }
      .code-runner { margin-bottom: 2rem; background: #1e1e1e; border-radius: 6px; overflow: hidden; }
      .runner-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; background: #2a2a2a; }
      .runner-badge { font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.5rem; background: #3a3a3a; border-radius: 4px; }
      .runner-btn-run, .runner-btn-reset { cursor: pointer; padding: 0.25rem 0.75rem; border: none; border-radius: 4px; font-size: 0.85rem; }
      .runner-btn-run { background: #22c55e; color: #000; }
      .runner-btn-run:disabled { opacity: 0.5; }
      .runner-btn-reset { background: #444; color: #eee; }
      .runner-editor { display: block; width: 100%; box-sizing: border-box; padding: 0.75rem; background: #1a1a2e; color: #e0e0e0; border: none; font-family: monospace; font-size: 0.85rem; resize: vertical; }
      .runner-output-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0.75rem; background: #2a2a2a; font-size: 0.75rem; }
      .runner-output { margin: 0; padding: 0.75rem; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; min-height: 3rem; }
      .runner-output.ok { color: #a3e635; }
      .runner-output.err { color: #f87171; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
